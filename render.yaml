services:
  - type: web
    name: chess-lobby-server
    runtime: node
    rootDir: apps/server
    buildCommand: npm install && npx prisma generate --schema=./prisma/schema.prisma
    startCommand: npx tsx src/index.ts
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.12.0"
